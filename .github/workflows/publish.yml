name: Publish to npm

# Auto-publishes to npm on every push to main where package.json "version"
# differs from the version already on the npm registry. No manual tagging needed.
# Requires an NPM_TOKEN repository secret (granular token with "Bypass 2FA"
# + read/write on the package, or a classic automation token).
on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Check if version changed
        id: check
        run: |
          PKG="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          echo "local=$PKG"
          PUBLISHED="$(npm view "$NAME" version 2>/dev/null || echo "none")"
          echo "published=$PUBLISHED"
          if [ "$PKG" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version $PKG already published; skipping."
          fi

      - name: Publish
        if: steps.check.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
